version: 2

models:
  - name: silver_dim_campaign
    description: "Silver layer table of dim_campaign"
    columns:
      - name: campaign_id
        tests:
          - not_null
          - unique
      - name: campaign_channel
        tests:
          - not_null
          - accepted_values:
                values: ['email', 'sms', 'google ads']
      - name: promo_id
        tests:
          - relationships:
                to: ref('silver_dim_promotion')
                field: promo_id
      - name: campaign_start_date
        tests:
          - not_null
          - expression_is_true:
              arguments:
                expression: 'campaign_start_date <= CURRENT_DATE'
      - name: campaign_end_date
        tests:
          - not_null
          - expression_is_true:
              arguments:
                expression: 'campaign_end_date >= campaign_start_date'
      - name: campaign_start_date_id
        tests:
          - not_null
          - relationships:
                to: ref('silver_dim_date')
                field: date_id
      - name: campaign_end_date_id
        tests:
          - not_null
          - relationships:
                to: ref('silver_dim_date')
                field: date_id
