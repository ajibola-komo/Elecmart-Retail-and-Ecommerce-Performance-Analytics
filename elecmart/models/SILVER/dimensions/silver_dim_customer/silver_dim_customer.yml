version: 2

models:
  - name: silver_dim_customer
    description: >
      Standardized and deduplicated customer dimension in the silver layer.
      This model provides a consistent and reliable view of customer attributes,
      enabling customer-level analysis across sales, marketing, and product domains.
      It serves as the authoritative source for customer segmentation, behavior analysis,
      and personalization use cases.

    columns:
      - name: customer_id
        description: Unique identifier for each customer.
        tests:
          - not_null
          - unique

      - name: email_address
        description: Primary email address used for customer identification and communication.
        tests:
          - not_null
          - unique:
              severity: warn

      - name: first_name
        description: Customer's first name.
        tests:
          - not_null

      - name: last_name
        description: Customer's last name.
        tests:
          - not_null

      - name: gender
        description: Customer's gender.
        tests:
          - not_null
          - accepted_values:
              values: ['male', 'female', 'other']

      - name: customer_persona
        description: >
          Synthetic customer persona representing behavioral patterns and preferences.
          Used for segmentation and analytical modeling.
        tests:
          - not_null
          - accepted_values:
              values: ['Tech Enthusiast', 'Bargain Hunter', 'Gift Shopper', 'Practical Buyer', 'Everyday Shopper']

      - name: birth_date
        description: Customer's date of birth.
        tests:
          - not_null

      - name: birth_year
        description: Year of birth derived from birth_date.
        tests:
          - not_null

      - name: age
        description: Customer's age derived from birth_date.
        tests:
          - not_null
          - expression_is_true:
              expression: "age >= 18"

      - name: age_group
        description: Customer age segment used for demographic analysis.
        tests:
          - not_null
          - accepted_values:
              values: ['18-24', '25-34', '35-44', '45-54', '55+']

      - name: location_id
        description: Foreign key referencing the customer's primary location.
        tests:
          - not_null
          - relationships:
              to: ref('silver_dim_location')
              field: location_id

      - name: signup_date
        description: Date the customer signed up or made their first purchase.
        tests:
          - not_null
          - expression_is_true:
              arguments:
                expression: "signup_date <= current_date"

      - name: signup_date_id
        description: Foreign key to the date dimension for signup_date.
        tests:
          - not_null
          - relationships:
              to: ref('silver_dim_date')
              field: date_id

      - name: signup_channel
        description: Channel through which the customer was acquired.
        tests:
          - not_null
          - accepted_values:
              values: ['web', 'mobile', 'store']

      - name: loyalty_status
        description: Customer loyalty tier based on engagement level.
        tests:
          - not_null
          - accepted_values:
              values: ['basic', 'silver', 'gold', 'elite']

      - name: income_bracket
        description: Customer income segment used for demographic analysis.
        tests:
          - not_null
          - accepted_values:
              values: ['Low Income', 'Middle Income', 'High Income']

      - name: sms_opt_in
        description: Indicates whether the customer has opted in to SMS communications.
        tests:
          - not_null
          - accepted_values:
              values: [true, false]

      - name: email_opt_in
        description: Indicates whether the customer has opted in to email communications.
        tests:
          - not_null
          - accepted_values:
              values: [true, false]