version: 2

models:
  - name: silver_dim_promotion
    description: "Silver layer table of dim_promotion"
    columns:
      - name: promo_id
        tests:
          - not_null
          - unique
      - name: promo_name
        tests:
          - not_null
      - name: promo_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Major','Medium','Flash']
      - name: discount_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Percentage_Discount','Fixed_Amount_Discount']
      - name: discount_value
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0.05,0.1,0.15,0.2, 20, 25]
      - name: promo_start_date
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: 'promo_start_date <= CURRENT_DATE'
      - name: promo_end_date
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: 'promo_end_date >= promo_start_date'
      - name: promo_start_date_id
        tests:
          - not_null
          - relationships:
              to: ref('silver_dim_date')
              field: date_id
      - name: promo_end_date_id
        tests:
          - not_null
          - relationships:
              to: ref('silver_dim_date')
              field: date_id
      - name: is_active
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [True, False]

