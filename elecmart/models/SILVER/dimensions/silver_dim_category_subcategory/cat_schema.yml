version: 2

models:
  - name: silver_dim_category
    description: "Silver layer table of dim_category"
    columns:
      - name: category_id
        tests:
          - not_null
          - unique
      - name: category_name
        tests:
          - not_null
  - name: silver_dim_subcategory
    description: "Silver layer table of dim_subcategory"
    columns:
      - name: subcategory_id
        tests:
          - not_null
          - unique
      - name: subcategory_name
        tests:
          - not_null
      - name: category_id
        tests:
          - not_null
          - relationships:
              to: ref('silver_dim_category')
              field: category_id


